 trigger:
 #- main
 - develop # Se activa con cualquier push a la rama develop

 pool:
   vmImage: 'ubuntu-latest'

 stages:
 # --- FASE 1: Compilar y Probar el Código ---
 - stage: Build
   displayName: 'Build & Test'
   jobs:
   - job: BuildApp
     displayName: 'Build .NET API and React Frontend'
     steps:
     # Compilar .NET API
     - task: DotNetCoreCLI@2
       displayName: 'Build .NET API'
       inputs:
         command: 'publish'
         publishWebProjects: true
         projects: 'src/api/MyApi.csproj'
         arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/api'
         zipAfterPublish: true

     # Compilar React App
     - task: NodeTool@0
       inputs:
         versionSpec: '18.x'
       displayName: 'Install Node.js'
     - task: Npm@1
       displayName: 'Install React Dependencies'
       inputs:
         command: 'ci'
         workingDir: 'src/frontend'
     - task: Npm@1
       displayName: 'Build React App'
       inputs:
         command: 'run'
         script: 'build'
         workingDir: 'src/frontend'
     - task: ArchiveFiles@2
       displayName: 'Archive React build'
       inputs:
         rootFolderOrFile: '$(System.DefaultWorkingDirectory)/src/frontend/build'
         includeRootFolder: false
         archiveType: 'zip'
         archiveFile: '$(Build.ArtifactStagingDirectory)/frontend.zip'
         replaceExistingArchive: true

     # Publicar ambos artefactos para la fase de Deploy
     - task: PublishBuildArtifacts@1
       displayName: 'Publish Artifacts'
       inputs:
         PathtoPublish: '$(Build.ArtifactStagingDirectory)'
         ArtifactName: 'app'

 # --- FASE 2: Desplegar Infraestructura y Aplicación ---
 - stage: Deploy
   displayName: 'Deploy Infrastructure & App'
   dependsOn: Build
   jobs:
   - deployment: DeployToAzure
     displayName: 'Deploy Bicep and App Code'
     environment: 'production' # Puedes definir un entorno en Azure DevOps
     strategy:
       runOnce:
         deploy:
           steps:
           # PASO CLAVE 1: Desplegar la Infraestructura con Bicep
           - task: AzureResourceManagerTemplateDeployment@3
             name: DeployInfrastructure
             displayName: 'Deploy Azure Infrastructure via Bicep'
             inputs:
               deploymentScope: 'Resource Group'
               azureResourceManagerConnection: 'TuConexionDeServicioAzure' # Debes crear un Service Connection en Azure DevOps
               subscriptionId: '$(subscriptionId)' # Define estas variables en el pipeline
               action: 'Create Or Update Resource Group'
               resourceGroupName: 'rg-evaluacion-$(Build.BuildId)' # Crea un RG único por ejecución
               location: 'East US' # O la región que prefieras
               templateLocation: 'Linked artifact'
               csmFile: 'infra/main.bicep'
               overrideParameters: '-baseName eval-$(Build.BuildId)'
               deploymentMode: 'Incremental'

           # PASO CLAVE 2: Desplegar la API .NET al App Service
           - task: AzureWebApp@1
             displayName: 'Deploy .NET API to App Service'
             inputs:
               azureSubscription: 'TuConexionDeServicioAzure'
               appType: 'webApp'
               # Usa la salida del paso de Bicep para encontrar el nombre del App Service
               appName: '$(DeployInfrastructure.outputs.apiHostName)'
               package: '$(Pipeline.Workspace)/app/api.zip'

           # PASO CLAVE 3: Desplegar el Frontend React a la Static Web App
           - task: AzureStaticWebApp@0
             displayName: 'Deploy React App to Static Web App'
             inputs:
               azureSubscription: 'TuConexionDeServicioAzure'
               # Usa la salida del paso de Bicep
               appName: '$(DeployInfrastructure.outputs.frontendHostName)'
               appLocation: '/'
               apiLocation: '' # La API se despliega por separado
               outputLocation: ''
               package: '$(Pipeline.Workspace)/app/frontend.zip'